spring.application.name=websiteapi

# ── Banco de dados (H2 em memória — dev/testes) ────────────────────────────────
spring.datasource.url=jdbc:h2:mem:arenape
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:minha-chave-secreta-super-segura-minimo-256bits!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Admin padrão (seed) ────────────────────────────────────────────────────────
admin.email=${ADMIN_EMAIL:admin@arenape.com}
admin.password=${ADMIN_PASSWORD:admin123}

# ── CORS ───────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000

